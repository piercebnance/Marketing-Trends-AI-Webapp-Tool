<!DOCTYPE html>
<html lang="en">

<!--Site setup thanks to Corey Schafer!-->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Site Info -->
    {% if title %}
    <title>Marketing Trends - {{ title }}</title>
    {% else %}
    <title>Marketing Trends</title>
    {% endif %}
    
    <meta name="description" content="FastAPI Tutorial">
    <meta name="author" content="Corey Schafer">

    <!-- Open Graph Tags: The title of the page for social media sharing. It can match the title tag or be more descriptive. -->
    <meta property="og:title" content="FastAPI Blog">

    <!-- Open Graph Tags: Typically set to "website" for static sites or "article" for content-heavy pages. -->
    <meta property="og:type" content="website">

    <!-- Open Graph Tags: The URL of the page, used to ensure link previews resolve to the correct page. -->
    <meta property="og:url" content="">

    <!-- Open Graph Tags: URL of an image that represents the page. Useful for link previews. -->
    <meta property="og:image" content="">

    <!-- Open Graph Tags: Provides an alternative text for the image to improve accessibility. -->
    <meta property="og:image:alt" content="">

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Custom Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Stylesheet -->
    <link rel="stylesheet" type="text/css" href="/static/css/main.css">

    <!-- Theme-aware text colors -->
    <style>
        body[data-bs-theme="light"],
        body[data-bs-theme="light"] * {
            color: #000 !important;
        }
        
        body[data-bs-theme="dark"],
        body[data-bs-theme="dark"] * {
            color: #fff !important;
        }
        
        /* Override navbar specific styles */
        body[data-bs-theme="light"] .navbar {
            color: #000;
        }
        
        body[data-bs-theme="dark"] .navbar {
            color: #fff;
        }
    </style>

    <!-- Set a theme color that matches your website's primary color -->
    <meta name="theme-color" content="#527c9f">

    <!-- Favicon for all browsers -->
    <link rel="icon" href="/static/icons/favicon.ico" sizes="any">
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml">

    <!-- Apple touch icon for iOS devices -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon.png">
    <!-- Web app manifest for Progressive Web Apps -->
    <link rel="manifest" href="/static/site.webmanifest">

    <!-- Content Security Policy: Uncomment to enhance security by restricting where content can be loaded from (useful for preventing certain attacks like XSS). Update if adding external sources (e.g., Google Fonts, Bootstrap CDN, analytics, etc). -->
    <!-- <meta http-equiv="Content-Security-Policy" content=" default-src 'self'; script-src 'self' code.jquery.com; style-src 'self' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' images.examplecdn.com; "> -->
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="site-header">
        <nav class="navbar navbar-expand-md bg-steel fixed-top" data-bs-theme="dark">
            <div class="container">
                <a class="navbar-brand me-4" href="#">Marketing Strategy Research</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggle"
                    aria-controls="navbarToggle" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarToggle">
                    <div class="navbar-nav me-auto">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </div>
                    <!-- Navbar Right Side -->
                    <div class="navbar-nav">
                        <div class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" id="bd-theme"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                <span id="bd-theme-text">🌗 Auto</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="bd-theme">
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="light">🌝
                                        Light</button>
                                </li>
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="dark">🌚
                                        Dark</button>
                                </li>
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="auto">🌗
                                        Auto</button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

  


        <div style="max-width: 600px; margin: auto; margin-top: 30px;">
            <h2>AI Chat</h2>
        
            <div id="chat-box" style="border:1px solid #ccc; height:300px; overflow-y:auto; padding:10px;">
            </div>
        
            <input id="message" type="text" placeholder="Type a message..." style="width:80%;" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </main>

    <footer class="mt-auto py-3 bg-body-tertiary border-top">
        <div class="container text-center">
            <p class="text-body-secondary mb-0">
                Push Marketing 
            </p>
        </div>
    </footer>

    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


    <script>
        const setTheme = (theme) => {
            if (theme === 'auto') {
                document.documentElement.setAttribute('data-bs-theme',
                    window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-bs-theme', theme);
            }
            localStorage.setItem('theme', theme);

            // Update button text
            const themeText = { light: '🌝 Light', dark: '🌚 Dark', auto: '🌗 Auto' };
            document.getElementById('bd-theme-text').textContent = themeText[theme];
        };

        // Set theme on click
        document.querySelectorAll('[data-bs-theme-value]').forEach(button => {
            button.addEventListener('click', () => setTheme(button.getAttribute('data-bs-theme-value')));
        });


        setTheme(localStorage.getItem('theme') || 'auto');
    </script>


    <div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailsModalLabel"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="modalDetails"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    // Script for the AI agent features
    <script>
        let currentItems = [];

        async function sendMessage() {
                const input = document.getElementById("message");
                const chatBox = document.getElementById("chat-box");
                const userMessage = input.value;

                if (!userMessage) return;

                chatBox.innerHTML += `<div><b>You:</b> ${userMessage}</div>`;
                input.value = "";

                try {
                    const res = await fetch("/api/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: userMessage })
                    });

                    const data = await res.json();

                    // Store items for later use
                    currentItems = data.items || [];

                    // Create buttons for each item
                    if (data.items && data.items.length > 0) {
                        chatBox.innerHTML += `<div><b>AI:</b> Here are the results:</div>`;
                        let buttonsHTML = '<div style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px;">';
                        data.items.forEach((item, index) => {
                            buttonsHTML += `<button onclick="handleItemClick(${index})" style="padding: 10px 16px; cursor: pointer; background-color: #527c9f; color: white; border: none; border-radius: 4px; font-size: 14px; flex: 0 1 auto;">${item.name}</button>`;
                        });
                        buttonsHTML += '</div>';
                        chatBox.innerHTML += buttonsHTML;
                    } else {
                        chatBox.innerHTML += `<div><b>AI:</b> ${data.response}</div>`;
                    }

                    chatBox.scrollTop = chatBox.scrollHeight;
                } catch (err) {
                    chatBox.innerHTML += `<div style="color:red;">Error: ${err}</div>`;
                }
            }

            function handleItemClick(index) {
                const item = currentItems[index];
                if (!item) return;

                // Populate modal
                document.getElementById('detailsModalLabel').textContent = item.name;
                
                let detailsHTML = `
                    <div>
                        <h6>Description</h6>
                        <p>${item.description || 'No description available'}</p>
                        
                        <h6>Strategy</h6>
                        <p>${item.strategy || 'No strategy available'}</p>
                        
                        <h6>Predicted ROI</h6>
                        <p>${item.roi || 'No ROI information available'}</p>
                    </div>
                `;
                
                document.getElementById('modalDetails').innerHTML = detailsHTML;
                
                // Show modal
                const modal = new bootstrap.Modal(document.getElementById('detailsModal'));
                modal.show();
            }
    </script>
</body>

</html>
